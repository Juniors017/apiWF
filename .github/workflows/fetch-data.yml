name: "Récupérer les photos (Picsum)"

on:
  schedule:
    - cron: "0 0 * * *"   # tous les jours à minuit UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: "Cloner le dépôt"
        uses: actions/checkout@v4

      - name: "Créer le dossier public et récupérer les données"
        run: |
          mkdir -p public
          curl -o public/photos-data.json "https://picsum.photos/v2/list?page=2&limit=20"

      - name: "Pousser les données vers le dépôt"
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Mise à jour automatique des photos (Picsum)"
          file_pattern: "public/photos-data.json"