name: "Récupérer les données de l'API Photos"

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: "Cloner le dépôt"
        uses: actions/checkout@v4

      - name: "Récupérer les données avec curl"
        run: |
          mkdir -p public
          curl -o public/photos-data.json https://jsonplaceholder.typicode.com/albums/1/photos

      - name: "Pousser les données vers le dépôt"
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Mise à jour automatique des données photos (actions GitHub)"
          file_pattern: "public/photos-data.json"