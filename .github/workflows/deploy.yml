name: "Build & Deploy (avec données fraîches)"

on:
  schedule:
    - cron: "0 0 * * *"   # tous les jours à minuit
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Étape 1 : récupérer les données directement dans le dossier public
      - name: Récupérer les photos (Picsum)
        run: |
          mkdir -p public
          curl -o public/photos-data.json "https://picsum.photos/v2/list?page=2&limit=20"

      # Étape 2 : installer les dépendances et construire le site
      - name: Installer les dépendances
        run: npm ci

      - name: Construire le site
        run: npm run build   # output:export -> dossier out

      # Étape 3 : déployer sur GitHub Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4