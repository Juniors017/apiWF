name: Déployer le site statique

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Cloner le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances
        run: npm ci

      - name: Construire le site (export statique)
        run: npm run build   # next build + next export sont automatiques avec output:'export'

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v4

      - name: Uploader l'artéfact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4